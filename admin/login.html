<style>
:root{--bg:#060612;--card:#13131f;--c4:#4d96ff;--c5:#c77dff;--c3:#6bcb77;--c1:#ff6b6b;--c2:#ffd93d;--text:#f0f0f8;--muted:#7070a0;--border:rgba(255,255,255,0.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Plus Jakarta Sans",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(120px);opacity:.18;animation:orbFloat 14s ease-in-out infinite;pointer-events:none}
.o1{width:600px;height:600px;background:#4d96ff;top:-200px;left:-200px;animation-delay:0s}
.o2{width:500px;height:500px;background:#c77dff;bottom:-150px;right:-150px;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
.box{background:rgba(19,19,31,.9);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;position:relative;z-index:1;backdrop-filter:blur(32px);box-shadow:0 24px 64px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07)}
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo-wrap img{width:66px;height:66px;border-radius:14px;object-fit:cover;border:2px solid rgba(77,150,255,.4);box-shadow:0 0 28px rgba(77,150,255,.28)}
.logo-wrap h1{font-size:1.1rem;font-weight:700;margin-top:.8rem}
.logo-wrap p{font-size:.76rem;color:var(--muted);margin-top:.2rem}
.tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:.25rem;margin-bottom:1.8rem;gap:.25rem}
.tbtn{flex:1;padding:.55rem;border-radius:8px;border:none;background:none;color:var(--muted);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.tbtn.active{background:rgba(77,150,255,.15);color:var(--c4);border:1px solid rgba(77,150,255,.25)}
.panel{display:none}.panel.active{display:block}
.fg{display:flex;flex-direction:column;gap:.38rem;margin-bottom:1rem}
label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.iw{position:relative}
input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:inherit;font-size:.9rem;width:100%;transition:border-color .2s,box-shadow .2s}
input:focus{outline:none;border-color:rgba(77,150,255,.55);box-shadow:0 0 0 3px rgba(77,150,255,.1)}
input.err-inp{border-color:rgba(255,107,107,.5)}
.eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:.95rem;padding:.2rem;line-height:1}
.eye:hover{color:var(--text)}
.btn-primary{width:100%;padding:.8rem;border-radius:10px;background:linear-gradient(135deg,var(--c4),var(--c5));color:#fff;font-family:inherit;font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(77,150,255,.3);margin-top:.4rem}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(77,150,255,.45)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-green{width:100%;padding:.8rem;border-radius:10px;background:linear-gradient(135deg,var(--c3),#3aaa5a);color:#061a0c;font-family:inherit;font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(107,203,119,.25);margin-top:.4rem}
.btn-green:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(107,203,119,.4)}
.btn-green:disabled{opacity:.5;cursor:not-allowed;transform:none}
.alert{border-radius:10px;padding:.75rem 1rem;font-size:.82rem;font-weight:500;margin-bottom:1rem;display:none;line-height:1.5}
.a-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.28);color:var(--c1)}
.a-ok{background:rgba(107,203,119,.1);border:1px solid rgba(107,203,119,.28);color:var(--c3)}
.a-info{background:rgba(77,150,255,.1);border:1px solid rgba(77,150,255,.28);color:var(--c4)}
.hint{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.9rem;line-height:1.7}
.hint b{color:var(--text)}
.otp-row{display:flex;gap:.4rem}
.otp-row input{text-align:center;font-size:1.3rem;font-weight:700;letter-spacing:.1em;padding:.7rem .3rem}
.timer{font-size:.72rem;color:var(--muted);text-align:center;margin-top:.7rem}
.timer.warn{color:var(--c1)}
.att{font-size:.7rem;text-align:right;margin-top:.3rem;color:var(--muted)}
.att.warn{color:var(--c1)}
.back-link{font-size:.78rem;color:var(--c4);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;margin-top:.8rem;display:block;text-align:center}
.back-link:hover{text-decoration:underline}
.strength{height:3px;border-radius:3px;margin-top:.4rem;transition:all .3s;background:var(--border)}
.strength.weak{background:var(--c1);width:33%}
.strength.medium{background:var(--c2);width:66%}
.strength.strong{background:var(--c3);width:100%}
</style>
</head>

    <h1>Portfolio Admin</h1>

  <div class="tabs">
    <button class="tbtn active" id="tab-login-btn" onclick="switchTab('login',this)">🔐 Sign In</button>
    <button class="tbtn" id="tab-reset-btn" onclick="switchTab('reset',this)">🔑 Reset Password</button>
  </div>

  <!-- ── LOGIN ── -->
  <div id="panel-login" class="panel active">
    <div class="alert a-err" id="login-alert"></div>
    <div class="fg">
      <label>Admin ID</label>
      <input type="text" id="login-id" placeholder="Enter admin ID" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="iw">
        <input type="password" id="login-pw" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
        <button class="eye" onclick="togglePw('login-pw',this)" tabindex="-1">👁</button>
      </div>
      <div class="att" id="att-left"></div>
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="hint">Default ID: <b>azmain</b> &nbsp;·&nbsp; Default PW: <b>CAF@2025</b></div>
  </div>

  <!-- ── RESET ── -->
  <div id="panel-reset" class="panel">
    <div class="alert" id="reset-alert"></div>

    <!-- Step 1 -->
    <div id="reset-s1">
      <div class="fg">
        <label>Registered Gmail</label>
        <input type="email" id="reset-email" value="chowdhury.azmain.faik@gmail.com" readonly style="opacity:.7;cursor:not-allowed"/>
      </div>
      <button class="btn-green" id="otp-btn" onclick="sendOTP()">📧 Send OTP to Gmail</button>
      <div class="hint">A 6-digit OTP will be sent to your registered Gmail.</div>
    </div>

    <!-- Step 2 -->
    <div id="reset-s2" style="display:none">
      <div class="fg">
        <label>Enter 6-digit OTP</label>
        <div class="otp-row">
          <input type="text" id="o1" maxlength="1" inputmode="numeric" oninput="onOtp(this,'o2')" onkeydown="onOtpKey(event,this,null)"/>
          <input type="text" id="o2" maxlength="1" inputmode="numeric" oninput="onOtp(this,'o3')" onkeydown="onOtpKey(event,this,'o1')"/>
          <input type="text" id="o3" maxlength="1" inputmode="numeric" oninput="onOtp(this,'o4')" onkeydown="onOtpKey(event,this,'o2')"/>
          <input type="text" id="o4" maxlength="1" inputmode="numeric" oninput="onOtp(this,'o5')" onkeydown="onOtpKey(event,this,'o3')"/>
          <input type="text" id="o5" maxlength="1" inputmode="numeric" oninput="onOtp(this,'o6')" onkeydown="onOtpKey(event,this,'o4')"/>
          <input type="text" id="o6" maxlength="1" inputmode="numeric" oninput="onOtp(this,null)" onkeydown="onOtpKey(event,this,'o5')"/>
        </div>
        <div class="timer" id="otp-timer"></div>
      </div>
      <div class="fg">
        <label>New Password</label>
        <div class="iw">
          <input type="password" id="new-pw" placeholder="Min 8 chars with a number" oninput="checkStrength(this.value)"/>
          <button class="eye" onclick="togglePw('new-pw',this)" tabindex="-1">👁</button>
        </div>
        <div class="strength" id="pw-strength"></div>
      </div>
      <div class="fg">
        <label>Confirm Password</label>
        <div class="iw">
          <input type="password" id="conf-pw" placeholder="Repeat new password"/>
          <button class="eye" onclick="togglePw('conf-pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-primary" id="reset-btn" onclick="verifyReset()">✅ Verify & Reset</button>
      <button class="back-link" onclick="backToStep1()">← Request new OTP</button>
    </div>
  </div>
</div>

<script>
const ALLOWED = 'chowdhury.azmain.faik@gmail.com';
const MAX_ATT = 5;
const SESSION_HOURS = 8;

let otpVal = null, otpExp = null, otpTimer = null;
let attempts = parseInt(localStorage.getItem('caf_attempts')||'0');
let lockUntil = parseInt(localStorage.getItem('caf_lockuntil')||'0');

// ── SHA-256 ─────────────────────────────────────────────────────────
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ── INIT defaults ────────────────────────────────────────────────────
(async () => {
  if (!localStorage.getItem('caf_id_h'))  localStorage.setItem('caf_id_h',  await sha256('azmain'));
  if (!localStorage.getItem('caf_pw_h'))  localStorage.setItem('caf_pw_h',  await sha256('CAF@2025'));
})();

// ── HELPERS ──────────────────────────────────────────────────────────
function switchTab(name, el) {
  ['login','reset'].forEach(n => {
    document.getElementById('panel-'+n).classList.remove('active');
  });
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  el.classList.add('active');
  hideAlert('login-alert'); hideAlert('reset-alert');
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'alert '+type; el.style.display = 'block';
}
function hideAlert(id) {
  const el = document.getElementById(id);
  if(el) { el.style.display='none'; el.textContent=''; }
}

function togglePw(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type==='password' ? 'text' : 'password';
  btn.textContent = i.type==='password' ? '👁' : '🙈';
}

function updateAttUI() {
  const el = document.getElementById('att-left');
  if (!el) return;
  const left = MAX_ATT - attempts;
  if (attempts === 0) { el.textContent=''; return; }
  el.textContent = left > 0 ? left+' attempt'+(left===1?'':'s')+' remaining' : '';
  el.className = 'att' + (left <= 2 ? ' warn' : '');
}

function checkStrength(pw) {
  const el = document.getElementById('pw-strength');
  if (!pw) { el.className='strength'; return; }
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  if (pw.length >= 12) score++;
  el.className = 'strength ' + (score<=1?'weak':score<=2?'medium':'strong');
}

// ── LOGIN ─────────────────────────────────────────────────────────────
async function doLogin() {
  hideAlert('login-alert');

  if (Date.now() < lockUntil) {
    const s = Math.ceil((lockUntil-Date.now())/1000);
    showAlert('login-alert', '🔒 Too many failed attempts. Wait '+s+' seconds.', 'a-err');
    return;
  }

  const id = (document.getElementById('login-id').value||'').trim().toLowerCase();
  const pw = document.getElementById('login-pw').value||'';
  if (!id || !pw) { showAlert('login-alert','Please enter both ID and password.','a-err'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Verifying…';

  const ih = await sha256(id);
  const ph = await sha256(pw);
  const storedIh = localStorage.getItem('caf_id_h');
  const storedPh = localStorage.getItem('caf_pw_h');

  if (ih === storedIh && ph === storedPh) {
    attempts = 0;
    localStorage.setItem('caf_attempts','0');
    localStorage.removeItem('caf_lockuntil');
    // Set session token with expiry
    const expiry = Date.now() + SESSION_HOURS * 3600 * 1000;
    localStorage.setItem('caf_session', JSON.stringify({ token: Math.random().toString(36).slice(2), expiry }));
    window.location.href = 'index.html';
  } else {
    attempts++;
    localStorage.setItem('caf_attempts', attempts);
    if (attempts >= MAX_ATT) {
      lockUntil = Date.now() + 5*60*1000;
      localStorage.setItem('caf_lockuntil', lockUntil);
      attempts = 0; localStorage.setItem('caf_attempts','0');
      showAlert('login-alert','🔒 Account locked for 5 minutes after too many failed attempts.','a-err');
    } else {
      showAlert('login-alert','❌ Incorrect ID or password.','a-err');
      updateAttUI();
    }
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

// ── OTP ───────────────────────────────────────────────────────────────
function onOtp(el, nextId) {
  el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
  if (el.value && nextId) document.getElementById(nextId).focus();
}
function onOtpKey(e, el, prevId) {
  if (e.key==='Backspace' && !el.value && prevId) document.getElementById(prevId).focus();
}
function getOTPInput() {
  return ['o1','o2','o3','o4','o5','o6'].map(id=>document.getElementById(id).value).join('');
}
function clearOTPInputs() {
  ['o1','o2','o3','o4','o5','o6'].forEach(id=>document.getElementById(id).value='');
}

function startOTPTimer(seconds) {
  clearInterval(otpTimer);
  const el = document.getElementById('otp-timer');
  let rem = seconds;
  const tick = () => {
    const m = Math.floor(rem/60), s = rem%60;
    el.textContent = 'OTP expires in '+m+':'+s.toString().padStart(2,'0');
    el.className = 'timer' + (rem<=60?' warn':'');
    if (rem-- <= 0) { clearInterval(otpTimer); el.textContent='OTP expired. Request a new one.'; otpVal=null; }
  };
  tick();
  otpTimer = setInterval(tick, 1000);
}

function backToStep1() {
  clearInterval(otpTimer);
  otpVal = null;
  clearOTPInputs();
  document.getElementById('reset-s1').style.display='block';
  document.getElementById('reset-s2').style.display='none';
  hideAlert('reset-alert');
}

async function sendOTP() {
  const btn = document.getElementById('otp-btn');
  btn.disabled = true; btn.textContent = '⏳ Sending…';

  otpVal = Math.floor(100000 + Math.random()*900000).toString();
  otpExp = Date.now() + 10*60*1000;

  // Try sending via EmailJS free tier
  try {
    await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        service_id: 'service_gmail',
        template_id: 'template_otp',
        user_id: 'public_key_placeholder',
        template_params: { to_name:'Azmain', otp_code: otpVal, to_email: ALLOWED }
      })
    });
  } catch(e) { /* fallback below */ }

  // Always show OTP in alert (until EmailJS is configured)
  showAlert('reset-alert',
    'OTP sent! Your code is: ' + otpVal + '  (valid 10 minutes)',
    'a-info'
  );

  document.getElementById('reset-s1').style.display = 'none';
  document.getElementById('reset-s2').style.display = 'block';
  startOTPTimer(600);
  clearOTPInputs();
  document.getElementById('o1').focus();

  btn.disabled = false; btn.textContent = '📧 Send OTP to Gmail';
}

async function verifyReset() {
  hideAlert('reset-alert');
  const entered = getOTPInput();
  const newPw   = document.getElementById('new-pw').value;
  const confPw  = document.getElementById('conf-pw').value;

  if (entered.length < 6)             { showAlert('reset-alert','Enter all 6 OTP digits.','a-err'); return; }
  if (!otpVal || Date.now()>otpExp)   { showAlert('reset-alert','OTP expired. Request a new one.','a-err'); return; }
  if (entered !== otpVal)             { showAlert('reset-alert','Incorrect OTP. Try again.','a-err'); return; }
  if (newPw.length < 8)               { showAlert('reset-alert','Password must be at least 8 characters.','a-err'); return; }
  if (!/[0-9]/.test(newPw))           { showAlert('reset-alert','Password must include at least one number.','a-err'); return; }
  if (newPw !== confPw)               { showAlert('reset-alert','Passwords do not match.','a-err'); return; }

  const btn = document.getElementById('reset-btn');
  btn.disabled=true; btn.textContent='Saving…';

  localStorage.setItem('caf_pw_h', await sha256(newPw));
  clearInterval(otpTimer); otpVal = null;

  showAlert('reset-alert','✅ Password reset! Redirecting to login…','a-ok');
  setTimeout(() => {
    backToStep1();
    switchTab('login', document.getElementById('tab-login-btn'));
  }, 2000);

  btn.disabled=false; btn.textContent='✅ Verify & Reset';
}

// Focus ID field on load
window.onload = () => document.getElementById('login-id').focus();
</script>
</body>
</html>
